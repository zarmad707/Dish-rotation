<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dish Rotation" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>Dish Rotation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #0A0A0A; overflow-x: hidden; }
    input:focus { outline: none; }
    select:focus { outline: none; }
    button:active { transform: scale(0.96); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .wcard { border-radius: 16px; border: 3px solid transparent; transition: all 0.2s; cursor: pointer; position: relative; text-align: center; overflow: hidden; }
    .wcard:active { transform: scale(0.97); }
    .edit-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.15); border-radius: 6px; padding: 3px 8px; font-size: 11px; opacity: 0.7; font-family: 'Space Mono', monospace; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .pulsing { animation: pulse 0.7s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SECTIONS = ["Hand Wand", "3 Compartment Sink", "Dry Rack", "Trash Take Out", "Pre-Clean"];
    const SECTION_ICONS = ["🚿", "🪣", "🧺", "🗑️", "🧽"];
    const SECTION_COLORS = [
      { bg: "#27AE60", light: "#D5F5E3", text: "#0B4A27" },
      { bg: "#2EC4B6", light: "#D5F4F2", text: "#0A4B47" },
      { bg: "#E9C46A", light: "#FDF6DC", text: "#6B4800" },
      { bg: "#6A4C93", light: "#EDE0FF", text: "#2E1059" },
      { bg: "#3A86FF", light: "#DCEEFF", text: "#002B7A" },
    ];
    const DEFAULT_MINUTES = 20;

    function formatTime(s) {
      return `${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
    }
    function formatTS(d) {
      return new Date(d).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    }
    function formatDate(d) {
      return new Date(d).toLocaleDateString([], { weekday:"short", month:"short", day:"numeric" });
    }
    function getColor(section, idx) {
      const si = SECTIONS.indexOf(section);
      return SECTION_COLORS[si >= 0 ? si : idx % SECTION_COLORS.length];
    }
    function getIcon(section, idx) {
      const si = SECTIONS.indexOf(section);
      return SECTION_ICONS[si >= 0 ? si : idx % SECTION_ICONS.length];
    }

    function useContainerWidth(ref) {
      const [width, setWidth] = useState(window.innerWidth);
      useEffect(() => {
        if (!ref.current) return;
        const ro = new ResizeObserver(([e]) => setWidth(e.contentRect.width));
        ro.observe(ref.current);
        setWidth(ref.current.offsetWidth);
        return () => ro.disconnect();
      }, [ref]);
      return width;
    }

    function CircleTimer({ seconds, total, color, size }) {
      const r = size/2 - size*0.07;
      const circ = 2*Math.PI*r;
      const offset = circ*(1-(total>0?seconds/total:0));
      const sw = size*0.065;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2A2A2A" strokeWidth={sw}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
        </svg>
      );
    }

    function WorkerModal({ worker, onClose, onSave }) {
      const [name, setName] = useState(worker.name);
      const [section, setSection] = useState(worker.section);
      const col = getColor(section, 0);
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}} onClick={onClose}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1C1C1C",border:`3px solid ${col.bg}`,borderRadius:20,width:"100%",maxWidth:460,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"24px 24px 14px",flexShrink:0}}>
              <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:30,color:col.bg,letterSpacing:3,marginBottom:16}}>EDIT STATION</div>
              <div style={{color:"#AAA",fontSize:12,letterSpacing:1,textTransform:"uppercase",marginBottom:8,fontFamily:"'Space Mono',monospace"}}>Worker Name</div>
              <input value={name} onChange={e=>setName(e.target.value)}
                style={{width:"100%",background:"#111",border:`2px solid ${col.bg}`,borderRadius:10,padding:"12px 14px",color:"#FFF",fontFamily:"'Space Mono',monospace",fontSize:16,outline:"none",boxSizing:"border-box"}}
                placeholder="Enter name…"/>
            </div>
            <div style={{overflowY:"auto",flex:1,padding:"0 24px 8px"}}>
              <div style={{color:"#AAA",fontSize:12,letterSpacing:1,textTransform:"uppercase",marginBottom:10,fontFamily:"'Space Mono',monospace"}}>Assign Station</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {SECTIONS.map((s,i)=>(
                  <button key={s} onClick={()=>setSection(s)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:12,border:"2px solid",borderColor:section===s?SECTION_COLORS[i].bg:"#2A2A2A",background:section===s?SECTION_COLORS[i].light:"#141414",color:section===s?SECTION_COLORS[i].text:"#888",cursor:"pointer",fontSize:15,fontFamily:"'Space Mono',monospace"}}>
                    <span style={{fontSize:22}}>{SECTION_ICONS[i]}</span>{s}
                    {section===s&&<span style={{marginLeft:"auto"}}>✓</span>}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,padding:"14px 24px 22px",borderTop:"1px solid #2A2A2A",flexShrink:0}}>
              <button onClick={onClose} style={{flex:1,padding:"13px",borderRadius:12,background:"#222",color:"#888",border:"2px solid #333",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:15}}>Cancel</button>
              <button onClick={()=>onSave(name.trim()||worker.name,section)} style={{flex:2,padding:"13px",borderRadius:12,background:col.bg,color:"#FFF",border:"none",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700}}>Save Changes</button>
            </div>
          </div>
        </div>
      );
    }

    function HistoryPanel({ log, onClose, onClear }) {
      const grouped = log.reduce((acc,e)=>{
        const d=formatDate(e.timestamp);
        if(!acc[d])acc[d]=[];
        acc[d].push(e);
        return acc;
      },{});
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:998}} onClick={onClose}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#141414",borderTop:"2px solid #2A2A2A",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:800,maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"20px 24px 14px",borderBottom:"1px solid #222",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:28,color:"#2B7FFF",letterSpacing:3}}>ROTATION HISTORY</div>
              <div style={{display:"flex",gap:10}}>
                {log.length>0&&<button onClick={onClear} style={{padding:"8px 16px",borderRadius:8,background:"transparent",border:"1px solid #444",color:"#888",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:13}}>Clear All</button>}
                <button onClick={onClose} style={{padding:"8px 16px",borderRadius:8,background:"transparent",border:"1px solid #333",color:"#CCC",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:13}}>Close ✕</button>
              </div>
            </div>
            <div style={{overflowY:"auto",flex:1,padding:"16px 24px 28px"}}>
              {log.length===0
                ?<div style={{color:"#444",textAlign:"center",padding:"40px 0",fontFamily:"'Space Mono',monospace",fontSize:14}}>No rotations recorded yet.</div>
                :Object.entries(grouped).reverse().map(([date,entries])=>(
                  <div key={date} style={{marginBottom:24}}>
                    <div style={{color:"#2B7FFF",fontFamily:"'Bebas Neue',monospace",fontSize:20,letterSpacing:2,marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1E1E1E"}}>{date}</div>
                    {[...entries].reverse().map((entry,ei)=>(
                      <div key={ei} style={{background:"#1A1A1A",border:"1px solid #242424",borderRadius:12,padding:"12px 16px",marginBottom:8}}>
                        <div style={{color:"#555",fontSize:11,fontFamily:"'Space Mono',monospace",letterSpacing:1,marginBottom:8}}>{formatTS(entry.timestamp)} · ROTATION #{entry.rotationNum}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                          {entry.assignments.map((a,ai)=>{
                            const col=getColor(a.section,ai);
                            return(
                              <div key={ai} style={{background:col.light,color:col.text,borderRadius:8,padding:"5px 11px",fontSize:12,fontFamily:"'Space Mono',monospace",border:`1px solid ${col.bg}`}}>
                                <span style={{fontWeight:700}}>{a.name}</span>
                                <span style={{opacity:0.6}}> → {getIcon(a.section,ai)} {a.section}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const containerRef = useRef(null);
      const cw = useContainerWidth(containerRef);
      const isWide = cw >= 680;
      const isMid  = cw >= 440;

      const [screen, setScreen] = useState("setup");
      const [numWorkers, setNumWorkers] = useState(3);
      const [rotationTime, setRotationTime] = useState(DEFAULT_MINUTES);
      const [workerNames, setWorkerNames] = useState(["","","","",""]);
      const [workerSections, setWorkerSections] = useState([0,1,2,3,4]);
      const [workers, setWorkers] = useState([]);
      const [running, setRunning] = useState(false);
      const [timeLeft, setTimeLeft] = useState(DEFAULT_MINUTES*60);
      const [alerting, setAlerting] = useState(false);
      const [rotationCount, setRotationCount] = useState(0);
      const [editWorker, setEditWorker] = useState(null);
      const [showHistory, setShowHistory] = useState(false);
      const [history, setHistory] = useState([]);
      const intervalRef = useRef(null);
      const audioCtxRef = useRef(null);
      const rotationTimeRef = useRef(rotationTime);
      useEffect(()=>{rotationTimeRef.current=rotationTime;},[rotationTime]);

      const playBeep = useCallback(()=>{
        try{
          if(!audioCtxRef.current)audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
          const ctx=audioCtxRef.current;
          [0,0.25,0.5].forEach(d=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.connect(g);g.connect(ctx.destination);
            o.frequency.value=880;o.type="square";
            g.gain.setValueAtTime(0.3,ctx.currentTime+d);
            g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.18);
            o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.18);
          });
        }catch(_){}
      },[]);

      const recordRotation = useCallback((ws,rCount)=>{
        setHistory(h=>[...h,{timestamp:Date.now(),rotationNum:rCount,assignments:ws.map(w=>({name:w.name,section:w.section}))}]);
      },[]);

      const doRotate = useCallback((cur,rCount)=>{
        const n=cur.length;
        if(!n)return cur;
        const secs=cur.map(w=>w.section);
        const rot=secs.map((_,i)=>secs[(i+1)%n]);
        const next=cur.map((w,i)=>({...w,section:rot[i],prev:secs[i]}));
        recordRotation(next,rCount);
        return next;
      },[recordRotation]);

      const handleStart=()=>{
        const list=Array.from({length:numWorkers},(_,i)=>({
          id:i+1,
          name:workerNames[i].trim()||`Worker ${i+1}`,
          section:SECTIONS[workerSections[i]%SECTIONS.length],
          prev:null,
        }));
        setWorkers(list);
        setTimeLeft(rotationTime*60);
        setRotationCount(0);
        setAlerting(false);
        setHistory([]);
        recordRotation(list,0);
        setScreen("live");
        setRunning(true);
      };

      useEffect(()=>{
        if(!running){clearInterval(intervalRef.current);return;}
        intervalRef.current=setInterval(()=>{
          setTimeLeft(t=>{
            if(t<=1){
              playBeep();
              setAlerting(true);
              setRunning(false);
              setRotationCount(c=>{
                const next=c+1;
                setWorkers(w=>doRotate(w,next));
                setTimeout(()=>{
                  setAlerting(false);
                  setTimeLeft(rotationTimeRef.current*60);
                  setRunning(true);
                },6000);
                return next;
              });
              return 0;
            }
            return t-1;
          });
        },1000);
        return()=>clearInterval(intervalRef.current);
      },[running,doRotate,playBeep]);

      const urgent=timeLeft<=60&&timeLeft>0&&running;
      const timerSize=isWide?200:isMid?160:130;
      const timerFont=isWide?48:isMid?38:30;
      const cardNameFs=isWide?30:isMid?24:20;
      const cardIconFs=isWide?44:isMid?36:30;
      const cardStatFs=isWide?22:isMid?18:15;
      const cardPad=isWide?22:isMid?16:12;
      const headerFs=isWide?32:isMid?26:20;
      const btnFs=isWide?16:isMid?14:13;
      const btnPad=isWide?16:isMid?13:11;

      const nbStyle={width:isMid?52:40,height:isMid?52:40,borderRadius:"50%",border:"2px solid #333",background:"#1A1A1A",color:"#FFF",fontSize:isMid?24:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0};
      const setupLbl={color:"#AAA",fontSize:isMid?13:11,letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:8,fontFamily:"'Space Mono',monospace"};
      const setupInp={width:"100%",background:"#111",border:"2px solid #333",borderRadius:10,padding:isMid?"12px 14px":"9px 11px",color:"#FFF",fontFamily:"'Space Mono',monospace",fontSize:isMid?16:14,outline:"none",boxSizing:"border-box"};

      if(screen==="setup"){
        return(
          <div ref={containerRef} style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:isMid?24:16,fontFamily:"'Courier New',monospace",overflowY:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:isWide?"1fr 1fr":"1fr",gap:16,width:"100%",maxWidth:860,paddingTop:isMid?16:8}}>

              {/* LEFT */}
              <div style={{background:"#161616",border:"2px solid #222",borderRadius:20,padding:isMid?28:20}}>
                <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:isWide?56:isMid?44:36,color:"#2B7FFF",letterSpacing:3,lineHeight:1,marginBottom:4}}>DISH<br/>ROTATION</div>
                <div style={{color:"#444",fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:28,fontFamily:"'Space Mono',monospace"}}>Kitchen Station Manager</div>

                <div style={setupLbl}>Number of Workers</div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
                  <button onClick={()=>setNumWorkers(Math.max(1,numWorkers-1))} style={nbStyle}>−</button>
                  <div style={{color:"#FFF",fontFamily:"'Bebas Neue',monospace",fontSize:isWide?52:40,flex:1,textAlign:"center"}}>{numWorkers}</div>
                  <button onClick={()=>setNumWorkers(Math.min(SECTIONS.length,numWorkers+1))} style={nbStyle}>+</button>
                </div>

                <div style={setupLbl}>Rotation Timer (minutes)</div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
                  <button onClick={()=>setRotationTime(Math.max(1,rotationTime-5))} style={nbStyle}>−</button>
                  <div style={{color:"#FFF",fontFamily:"'Bebas Neue',monospace",fontSize:isWide?52:40,flex:1,textAlign:"center"}}>{rotationTime}</div>
                  <button onClick={()=>setRotationTime(Math.min(60,rotationTime+5))} style={nbStyle}>+</button>
                </div>

                {!isWide&&<button onClick={handleStart} style={{width:"100%",padding:"16px",background:"#2B7FFF",border:"none",borderRadius:14,fontFamily:"'Bebas Neue',monospace",fontSize:26,color:"#FFF",letterSpacing:3,cursor:"pointer"}}>START SHIFT</button>}
              </div>

              {/* RIGHT */}
              <div style={{background:"#161616",border:"2px solid #222",borderRadius:20,padding:isMid?28:20}}>
                <div style={setupLbl}>Worker Names</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:22}}>
                  {Array.from({length:numWorkers},(_,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:isMid?32:26,height:isMid?32:26,borderRadius:"50%",background:SECTION_COLORS[i].bg,display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontSize:isMid?14:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <input value={workerNames[i]} onChange={e=>{const n=[...workerNames];n[i]=e.target.value;setWorkerNames(n);}} placeholder={`Worker ${i+1} name…`} style={setupInp}/>
                    </div>
                  ))}
                </div>

                <div style={setupLbl}>Starting Stations</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:isWide?0:22}}>
                  {Array.from({length:numWorkers},(_,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:isMid?32:26,height:isMid?32:26,borderRadius:"50%",background:SECTION_COLORS[i].bg,display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontSize:isMid?14:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,position:"relative"}}>
                        <select value={workerSections[i]} onChange={e=>{const n=[...workerSections];n[i]=Number(e.target.value);setWorkerSections(n);}}
                          style={{width:"100%",background:"#111",border:`2px solid ${SECTION_COLORS[i].bg}`,borderRadius:10,padding:isMid?"11px 14px":"9px 11px",color:"#FFF",fontFamily:"'Space Mono',monospace",fontSize:isMid?14:12,outline:"none",cursor:"pointer",appearance:"none"}}>
                          {SECTIONS.map((s,si)=><option key={s} value={si}>{SECTION_ICONS[si]} {s}</option>)}
                        </select>
                        <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#888",pointerEvents:"none"}}>▾</div>
                      </div>
                    </div>
                  ))}
                </div>

                {isWide&&<button onClick={handleStart} style={{width:"100%",padding:"16px",background:"#2B7FFF",border:"none",borderRadius:14,fontFamily:"'Bebas Neue',monospace",fontSize:26,color:"#FFF",letterSpacing:3,cursor:"pointer",marginTop:22}}>START SHIFT</button>}
              </div>
            </div>
          </div>
        );
      }

      const cardCols=isWide?(workers.length<=3?workers.length:workers.length<=4?2:3):(isMid?2:2);

      return(
        <div ref={containerRef} style={{minHeight:"100vh",background:alerting?"#001830":"#0A0A0A",transition:"background 0.4s",padding:isMid?"16px 18px":"12px 12px",fontFamily:"'Courier New',monospace"}}>

          {/* TOP BAR */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:headerFs,color:"#2B7FFF",letterSpacing:3,lineHeight:1}}>DISH ROTATION</div>
              <div style={{background:"#1A1A1A",border:"1px solid #2A2A2A",borderRadius:14,padding:"3px 10px",color:"#555",fontSize:11,letterSpacing:1,fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap"}}>#{rotationCount}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowHistory(true)} style={{padding:`${btnPad-3}px ${btnPad}px`,borderRadius:10,background:"#1A1A1A",border:"1px solid #2A2A2A",color:"#CCC",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs-1,whiteSpace:"nowrap"}}>📋 {history.length>0?history.length:""} Log</button>
              <button onClick={()=>{setScreen("setup");setRunning(false);setAlerting(false);}} style={{padding:`${btnPad-3}px ${btnPad}px`,borderRadius:10,background:"transparent",border:"1px solid #222",color:"#666",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs-1}}>⚙️</button>
            </div>
          </div>

          {alerting&&(
            <div className="pulsing" style={{background:"#CC3300",color:"#FFF",textAlign:"center",padding:isMid?"16px":"12px",borderRadius:14,marginBottom:14}}>
              <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:isWide?40:28,letterSpacing:4}}>🔔 ROTATE NOW!</div>
              <div style={{fontSize:isMid?13:11,letterSpacing:2,opacity:0.9,fontFamily:"'Space Mono',monospace"}}>TIME IS UP — MOVE TO YOUR NEXT STATION</div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:isWide?"auto 1fr":"1fr",gap:14,alignItems:"start"}}>

            {/* TIMER PANEL */}
            <div style={{background:"#141414",border:"2px solid #1E1E1E",borderRadius:18,padding:isMid?"20px 18px":"14px 12px",display:"flex",flexDirection:isWide?"column":"row",alignItems:"center",gap:isWide?14:12,flexWrap:isWide?"nowrap":"wrap",justifyContent:"center"}}>
              <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <CircleTimer seconds={timeLeft} total={rotationTime*60} color={urgent?"#FFB800":"#2B7FFF"} size={timerSize}/>
                <div style={{position:"absolute",fontFamily:"'Bebas Neue',monospace",fontSize:timerFont,letterSpacing:2,color:urgent?"#FFB800":"#FFF",textAlign:"center"}}>{formatTime(timeLeft)}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,width:isWide?"100%":"auto",minWidth:isWide?0:160}}>
                <div style={{fontSize:10,color:urgent?"#FFB800":"#444",letterSpacing:2,textTransform:"uppercase",textAlign:"center",fontFamily:"'Space Mono',monospace"}}>
                  {urgent?"⚠️ ALMOST TIME":"until next rotation"}
                </div>
                {running
                  ?<button onClick={()=>setRunning(false)} style={{padding:`${btnPad}px`,borderRadius:12,background:"#1E1E1E",border:"2px solid #333",color:"#CCC",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs,width:"100%"}}>⏸ Pause</button>
                  :<button onClick={()=>setRunning(true)} style={{padding:`${btnPad}px`,borderRadius:12,background:"#2B7FFF",border:"none",color:"#FFF",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs,fontWeight:700,width:"100%"}}>▶ Resume</button>
                }
                <button onClick={()=>{const next=rotationCount+1;setWorkers(w=>doRotate(w,next));setRotationCount(next);setTimeLeft(rotationTime*60);setRunning(true);setAlerting(false);playBeep();}} style={{padding:`${btnPad}px`,borderRadius:12,background:"#1E1E1E",border:"2px solid #333",color:"#CCC",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs,width:"100%"}}>↻ Rotate</button>
                <button onClick={()=>{setTimeLeft(rotationTime*60);setRunning(true);setAlerting(false);}} style={{padding:`${btnPad}px`,borderRadius:12,background:"#1E1E1E",border:"2px solid #333",color:"#CCC",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:btnFs,width:"100%"}}>⟳ Reset</button>
              </div>
            </div>

            {/* WORKER CARDS */}
            <div style={{display:"grid",gridTemplateColumns:`repeat(${cardCols},1fr)`,gap:isMid?12:8}}>
              {workers.map((w,i)=>{
                const col=getColor(w.section,i);
                const icon=getIcon(w.section,i);
                return(
                  <div key={w.id} className={`wcard${alerting?" pulsing":""}`} style={{background:col.light,borderColor:col.bg,padding:cardPad}} onClick={()=>setEditWorker(w)}>
                    <div className="edit-badge" style={{color:col.text}}>✏️</div>
                    <div style={{color:col.text,fontSize:10,letterSpacing:2,opacity:0.5,marginBottom:4,fontFamily:"'Space Mono',monospace",textTransform:"uppercase"}}>Worker {w.id}</div>
                    <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:cardNameFs,color:col.text,letterSpacing:1,lineHeight:1,marginBottom:6}}>{w.name}</div>
                    <div style={{fontSize:cardIconFs,margin:"6px 0"}}>{icon}</div>
                    <div style={{fontFamily:"'Bebas Neue',monospace",fontSize:cardStatFs,color:col.text,letterSpacing:1,lineHeight:1.2}}>{w.section}</div>
                    {w.prev&&<div style={{fontSize:10,color:col.text,opacity:0.4,marginTop:6,fontFamily:"'Space Mono',monospace"}}>↩ {w.prev}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {editWorker&&<WorkerModal worker={editWorker} onClose={()=>setEditWorker(null)} onSave={(name,section)=>{setWorkers(ws=>ws.map(w=>w.id===editWorker.id?{...w,name,section}:w));setEditWorker(null);}}/>}
          {showHistory&&<HistoryPanel log={history} onClose={()=>setShowHistory(false)} onClear={()=>setHistory([])}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
